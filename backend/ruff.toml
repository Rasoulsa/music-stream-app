line-length = 88
target-version = "py313"

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = [
    "E501",  # line too long handled by formatter
]

[lint.per-file-ignores]
"config/settings/*.py" = ["F403", "F405"]

[format]
quote-style = "double"
