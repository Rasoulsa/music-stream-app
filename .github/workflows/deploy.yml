name: Deploy to VPS

# -----------------------------------------------------------------------------
# Triggers:
#   - Pull Request to main: run tests only
#   - Push/Merge to main: run tests only
#   - Manual: Actions tab → "Run workflow" → run tests, deploy, verify
#
# Production deployment is intentionally manual.
# This prevents accidental VPS updates when merging to main.
#
# Monitoring:
#   - App deploy is the default.
#   - Monitoring deploy is opt-in using the with_monitoring checkbox.
#   - Use with_monitoring=true when enabling/updating Prometheus, Grafana,
#     node_exporter, cAdvisor, dashboards, or monitoring config.
# -----------------------------------------------------------------------------
on:
  pull_request:
    branches: [main]

  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      confirm:
        description: "Type deploy to confirm production VPS deployment"
        required: true
        default: ""

      with_monitoring:
        description: "Also start/update Prometheus, Grafana, node_exporter, and cAdvisor"
        required: false
        type: boolean
        default: false

# Belt-and-suspenders with deploy.sh's own flock lock:
# CI won't start a second deploy while one is already running.
concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # 1. Test gate — always run tests before any possible deployment
  #
  # Runs on:
  #   - pull_request to main
  #   - push/merge to main
  #   - manual workflow_dispatch
  #
  # Also validates that the production + VPS + monitoring Compose configuration
  # can be rendered successfully.
  # ---------------------------------------------------------------------------
  test:
    name: Test gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: musicdb
          POSTGRES_USER: musicuser
          POSTGRES_PASSWORD: musicuser123
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U musicuser -d musicdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Run backend tests
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5433
          POSTGRES_DB: musicdb
          POSTGRES_USER: musicuser
          POSTGRES_PASSWORD: musicuser123
        run: uv run pytest -v --ds=config.settings.ci --no-cov --create-db

      - name: Validate production Compose config with monitoring
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            -f docker-compose.vps.yml \
            -f docker-compose.monitoring.yml \
            --env-file .env.prod.example \
            -p music-stream-prod \
            config >/dev/null

          echo "✅ Production + monitoring Compose config is valid"

  # ---------------------------------------------------------------------------
  # 2. Deploy — manual only
  #
  # This job runs ONLY when:
  #   - The workflow was started manually from GitHub Actions
  #   - The selected branch is main
  #   - The confirm input is exactly: deploy
  #
  # It does NOT run on push to main.
  # It does NOT run after merging a PR.
  # It does NOT run on feature branches.
  #
  # Monitoring behavior:
  #   - with_monitoring=false → app-only deploy
  #   - with_monitoring=true  → app + monitoring deploy/update
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main' &&
      github.event.inputs.confirm == 'deploy'

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh

          # Write the CI deploy private key.
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Pre-seed known_hosts to satisfy StrictHostKeyChecking.
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run remote deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          WITH_MONITORING: ${{ github.event.inputs.with_monitoring }}
        run: |
          # Pass VPS_APP_DIR and WITH_MONITORING as remote script arguments.
          # <<'ENDSSH' means nothing inside the heredoc is expanded by the
          # GitHub Actions runner; it runs on the remote VPS shell.
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            "${VPS_USER}@${VPS_HOST}" bash -s -- "${VPS_APP_DIR}" "${WITH_MONITORING}" <<'ENDSSH'
          set -euo pipefail

          APP_DIR="$1"
          WITH_MONITORING="${2:-false}"

          cd "$APP_DIR"

          echo "==> Syncing to origin/main..."
          git fetch --all --prune
          git checkout main
          git reset --hard origin/main

          echo "==> Commit: $(git rev-parse --short HEAD)"

          if [[ "$WITH_MONITORING" == "true" ]]; then
            echo "==> Running deploy with monitoring..."
            bash scripts/deploy.sh --with-monitoring
          else
            echo "==> Running app-only deploy..."
            bash scripts/deploy.sh
          fi
          ENDSSH

  # ---------------------------------------------------------------------------
  # 3. Verify — manual deploy verification only
  #
  # Runs only after the manual deploy job.
  # Confirms HAProxy → nginx → backend is fully working end-to-end.
  # ---------------------------------------------------------------------------
  verify:
    name: Verify health
    needs: deploy
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main' &&
      github.event.inputs.confirm == 'deploy'

    steps:
      - name: Public HTTPS health check
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          echo "Checking ${HEALTHCHECK_URL}..."

          for i in 1 2 3 4 5 6; do
            if curl -fsS "${HEALTHCHECK_URL}" >/dev/null; then
              echo "✅ Health OK — deploy complete"
              exit 0
            fi

            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done

          echo "❌ Health check failed after retries"
          exit 1
