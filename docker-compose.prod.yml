services:
  db:
    env_file:
      - ./.env.prod
    restart: unless-stopped

  redis:
    restart: unless-stopped
    # No ports — internal only, not reachable from host

  minio:
    env_file:
      - ./.env.prod
    restart: unless-stopped
    # No ports — Django reaches MinIO internally via http://minio:9000
    # To access the MinIO console temporarily: add ports here and remove after

  createbuckets:
    env_file:
      - ./.env.prod

  backend:
    build:
      context: ./backend
      target: production        # prod stage = gunicorn, collectstatic
    env_file:
      - ./.env.prod
    environment:
      - USE_DOCKER=true
    command: >
      sh -c "
      /app/.venv/bin/python manage.py migrate --noinput &&
      /app/.venv/bin/python manage.py collectstatic --noinput &&
      /app/.venv/bin/gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      --timeout 120
      "
    expose:
      - "8000"                  # internal only — Nginx reaches it
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      target: production
    env_file:
      - ./.env.prod
    volumes:
      - media_files:/app/media
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: music-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/api/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
