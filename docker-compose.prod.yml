# Production overrides.
# Run with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build

services:
  db:
    env_file:
      - ./.env.prod
    restart: unless-stopped

  redis:
    restart: unless-stopped
    # No ports — internal only

  minio:
    env_file:
      - ./.env.prod
    restart: unless-stopped
    # No ports — Django reaches MinIO via http://minio:9000
    # Temporarily expose console: add "9001:9001" here if needed

  createbuckets:
    env_file:
      - ./.env.prod

  backend:
    build:
      context: ./backend
      target: production
    env_file:
      - ./.env.prod
    environment:
      - USE_DOCKER=true
    command: >
      sh -c "
      /app/.venv/bin/python manage.py migrate --noinput &&
      /app/.venv/bin/python manage.py collectstatic --noinput &&
      /app/.venv/bin/gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      --timeout 120
      "
    expose:
      - "8000"              # internal only — edge nginx reaches it
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      target: production
    env_file:
      - ./.env.prod
    volumes:
      - media_files:/app/media
    restart: unless-stopped

  # ── Frontend — React static build ──────────────────────────────
  # Built once at image build time. Served by the internal nginx
  # (frontend/nginx.conf). Edge nginx proxies / here.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Same-origin: frontend and backend are both on :80 behind
        # the edge nginx → /api/v1 with no host/port → zero CORS.
        VITE_API_BASE_URL: /api/v1
    expose:
      - "80"                # internal only — edge nginx reaches it
    depends_on:
      - backend
    restart: unless-stopped

  # ── Edge reverse proxy ─────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: music-nginx
    ports:
      - "80:80"             # THE only public port in the whole stack
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro   # serve /static/ directly
      - media_files:/app/media:ro          # serve /media/ directly
    depends_on:
      - backend
      - frontend            # both upstreams must exist before nginx starts
      - minio
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/api/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
