# ============================================================
# Prometheus scrape configuration for Music Stream App.
#
# Prometheus PULLS /metrics from each target every 15s.
# All targets are internal Docker service names on the shared network.
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: music-stream

# Alert rules loaded from this directory.
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus scrapes itself (useful sanity check).
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Django application metrics via django-prometheus.
  - job_name: django
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]

  # Host-level metrics (CPU, RAM, disk, network).
  - job_name: node
    static_configs:
      - targets: ["node_exporter:9100"]

  # Per-container metrics (CPU/mem per container).
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
