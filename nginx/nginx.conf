# ============================================================
# Edge reverse proxy — the single public entry point.
#
# Responsibilities:
#   - Route /api, /admin       → Django/gunicorn (backend:8000)
#   - Route /static, /media    → shared volumes (direct disk)
#   - Route /music-media       → MinIO (internal, proxied)
#   - Route everything else    → React SPA (frontend:80)
#
# Day 32: gzip, security headers, keepalive upstreams,
#         timeout tuning, /healthz, version hiding.
# ============================================================

# ── Upstreams with keepalive ────────────────────────────────
# keepalive reuses TCP connections to backends instead of
# opening a new one per request → lower latency, less overhead.
upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:80;
    keepalive 16;
}

upstream minio {
    server minio:9000;
    keepalive 16;
}

# ── Gzip compression (applies to all locations below) ───────
gzip              on;
gzip_vary         on;        # adds "Vary: Accept-Encoding" for caches
gzip_proxied      any;       # compress proxied responses too
gzip_comp_level   5;         # 5 = good balance of CPU vs ratio
gzip_min_length   256;       # don't bother compressing tiny responses
gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml
    font/ttf
    font/otf
    application/vnd.ms-fontobject;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Don't leak nginx version in Server header / error pages.
    server_tokens off;

    # Allow audio file uploads through the proxy (your app uploads 50MB).
    client_max_body_size 50M;
    client_body_timeout   120s;   # slow uploads need time

    # ── Baseline security headers (Day 35 does the deep dive) ──
    # Applied to all responses from this server block.
    add_header X-Content-Type-Options    "nosniff"        always;
    add_header X-Frame-Options           "SAMEORIGIN"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection          "1; mode=block"  always;

    # ── Health check (for monitoring / load balancers, Day 38+) ─
    # Returns 200 without touching any upstream — pure liveness.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ── Django collected static (admin/DRF CSS/JS) ─────────────
    # Served directly from the shared Docker volume.
    location /static/ {
        alias /app/staticfiles/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # ── Media files (local-disk fallback when USE_S3=false) ────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # ── API → Django gunicorn ───────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;                 # required for keepalive
        proxy_set_header   Connection        ""; # clear "close" for keepalive
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;

        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ── Django admin ────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
    }

    # ── MinIO media (S3 objects, proxied — MinIO never public) ──
    # Browser hits /music-media/... → nginx forwards to MinIO.
    # NOTE: Host header MUST be minio:9000 so MinIO's S3 path
    #       routing / signature validation works correctly.
    location /music-media/ {
        proxy_pass         http://minio/music-media/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              minio:9000;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_hide_header  x-amz-id-2;
        proxy_hide_header  x-amz-request-id;

        # Audio streaming — support range/seek requests.
        proxy_buffering    off;
        proxy_set_header   Range    $http_range;
        proxy_set_header   If-Range $http_if_range;

        # Cache audio aggressively in the browser.
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ── React SPA (everything else) ────────────────────────────
    # Frontend container's own nginx handles try_files fallback.
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
    }
}
