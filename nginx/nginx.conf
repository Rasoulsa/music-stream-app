# ============================================================
# Edge reverse proxy — single public entry point.
# ============================================================

upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:80;
    keepalive 16;
}

gzip              on;
gzip_vary         on;
gzip_proxied      any;
gzip_comp_level   5;
gzip_min_length   256;
gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml
    font/ttf
    font/otf
    application/vnd.ms-fontobject;

server {
    listen 80;
    listen [::]:80;
    server_name _;
    server_tokens off;

    client_max_body_size 50M;
    client_body_timeout   120s;

    # Docker's embedded DNS — re-resolve every 10s to catch
    # container restarts (prevents stale upstream IP cache).
    resolver 127.0.0.11 valid=10s ipv6=off;

    add_header X-Content-Type-Options    "nosniff"        always;
    add_header X-Frame-Options           "SAMEORIGIN"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection          "1; mode=block"  always;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /static/ {
        alias /app/staticfiles/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    location /admin/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
    }

    # MinIO media proxy — variable forces per-request DNS resolution
    location /music-media/ {
        set $minio_upstream http://minio:9000;
        proxy_pass         $minio_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              minio:9000;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_hide_header  x-amz-id-2;
        proxy_hide_header  x-amz-request-id;
        proxy_buffering    off;
        proxy_set_header   Range    $http_range;
        proxy_set_header   If-Range $http_if_range;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
    }
}
