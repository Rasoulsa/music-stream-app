# ============================================================
# Edge reverse proxy — single public entry point.
#
# Deployment notes:
#   I: Container port 80 is bound to host :80 directly.
#
#   II: HAProxy is introduced on host :443 as a TLS-passthrough
#       SNI splitter. App Nginx moves to 127.0.0.1:8444.
#       At that point:
#         - Add "listen 443 ssl" server block with Let's Encrypt cert.
#         - Uncomment the HSTS header below.
#
# Docker DNS note:
#   Docker service names such as backend, frontend, and minio are resolved by
#   Docker's embedded DNS server at 127.0.0.11.
#
#   We intentionally use resolver + variable-based proxy_pass below so Nginx
#   can re-resolve upstream service names after containers are recreated during
#   deploys. This helps avoid stale upstream IPs and transient 502 errors.
# ============================================================

# ── Real client IP ───────────────────────────────────────────
# I:  no proxy in front — $remote_addr is the real client IP.
# II: HAProxy will be in front on localhost. Without these lines,
#     $remote_addr would always be 127.0.0.1 after HAProxy is added.
#     These lines are harmless on I.
set_real_ip_from  127.0.0.1;
set_real_ip_from  172.16.0.0/12;   # Docker bridge range
real_ip_header    X-Forwarded-For;
real_ip_recursive on;

# ── Gzip ─────────────────────────────────────────────────────
gzip              on;
gzip_vary         on;
gzip_proxied      any;
gzip_comp_level   5;
gzip_min_length   256;
gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml
    font/ttf
    font/otf
    application/vnd.ms-fontobject;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ── Hide nginx version ───────────────────────────────────
    server_tokens off;

    # ── Docker DNS ───────────────────────────────────────────
    # Docker embedded DNS server.
    # Re-resolve every 10s to handle backend/frontend/minio restarts cleanly.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Variable-based upstreams force runtime DNS resolution with the resolver
    # above. This avoids stale upstream IPs after containers are recreated.
    set $backend_upstream  backend:8000;
    set $frontend_upstream frontend:80;
    set $minio_upstream    minio:9000;

    # ── Security headers ─────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "DENY"          always;
    add_header Referrer-Policy         "same-origin"   always;
    add_header X-XSS-Protection        "1; mode=block" always;

    # HSTS — uncomment ONLY after HTTPS is confirmed working in Phase II.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Request limits ───────────────────────────────────────
    client_max_body_size 50M;
    client_body_timeout  120s;

    # ── Nginx health check ───────────────────────────────────
    # Used by Docker healthcheck.
    # Separate from /api/health/ which hits Django.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # ── Static files served directly from volume ─────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        access_log off;
    }

    # ── Local media fallback served directly from volume ─────
    # Used if USE_S3=false.
    # In production USE_S3=true, so /music-media/ via MinIO is usually active.
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        access_log off;
    }

    # ── API ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://$backend_upstream;
        proxy_http_version 1.1;

        proxy_set_header   Connection          "";
        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   $scheme;
        proxy_set_header   X-Forwarded-Host    $host;

        proxy_redirect     off;

        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;

        # Retry safe upstream connection failures.
        # With a single backend this mainly protects against very short
        # connection-reset/startup windows during redeploys.
        proxy_next_upstream       error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    # ── Django admin ─────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://$backend_upstream;
        proxy_http_version 1.1;

        proxy_set_header   Connection          "";
        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   $scheme;
        proxy_set_header   X-Forwarded-Host    $host;

        proxy_redirect     off;

        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;

        proxy_next_upstream       error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    # ── MinIO object storage proxy ───────────────────────────
    # Bucket: music-media.
    # Objects stored as e.g. songs/uuid.mp3.
    #
    # The request path /music-media/... maps naturally to MinIO path-style
    # bucket access:
    #   http://minio:9000/music-media/...
    #
    # Range / If-Range headers are passed through to support HTTP range
    # requests for audio streaming.
    #
    # Day 40: this path stays the same. MinIO remains internal.
    location /music-media/ {
        proxy_pass         http://$minio_upstream$request_uri;
        proxy_http_version 1.1;

        proxy_set_header   Connection        "";
        proxy_set_header   Host              minio:9000;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Range             $http_range;
        proxy_set_header   If-Range          $http_if_range;

        proxy_hide_header  x-amz-id-2;
        proxy_hide_header  x-amz-request-id;

        proxy_buffering    off;

        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
    }

    # ── Frontend SPA ─────────────────────────────────────────
    location / {
        proxy_pass         http://$frontend_upstream;
        proxy_http_version 1.1;

        proxy_set_header   Connection          "";
        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   $scheme;
        proxy_set_header   X-Forwarded-Host    $host;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        proxy_next_upstream       error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }
}
