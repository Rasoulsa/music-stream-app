# ============================================================
# Edge reverse proxy — the single public entry point.
#
# Responsibilities:
#   - Route /api, /admin → Django/gunicorn (backend:8000)
#   - Route /static, /media → shared volumes (direct disk)
#   - Route everything else → React SPA (frontend:80)
#
# Day 32 will add: gzip, security headers, rate limiting,
#                  upstream keepalive, timeout tuning.
# ============================================================

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Allow audio file uploads through the proxy
    client_max_body_size 50M;

    # ── Django collected static (admin/DRF CSS/JS) ─────────────
    # Served directly from the shared Docker volume.
    # backend writes here via collectstatic; nginx reads it.
    location /static/ {
        alias /app/staticfiles/;
        expires 7d;
        access_log off;
    }

    # ── Media files (local-disk fallback) ──────────────────────
    # When USE_S3=true Django redirects to MinIO directly,
    # so this block is only hit when USE_S3=false.
    location /media/ {
        alias /app/media/;
        expires 7d;
        access_log off;
    }

    # ── API → Django gunicorn ───────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;

        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ── Django admin ────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
    }

    # ── React SPA (everything else) ────────────────────────────
    # The frontend container's own nginx handles SPA fallback
    # (try_files → index.html) so React Router works correctly.
    location / {
        proxy_pass       http://frontend;
        proxy_set_header Host $host;
    }
}
