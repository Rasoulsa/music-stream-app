# ============================================================
# Edge reverse proxy — single public entry point.
#
# Deployment notes:
#   I: Container port 80 is bound to host :80 directly.
#   II: HAProxy is introduced on host :443 as a TLS-passthrough
#           SNI splitter. App Nginx moves to 127.0.0.1:8444 (internal).
#           At that point:
#             - Add "listen 443 ssl" server block with Let's Encrypt cert.
#             - Uncomment the HSTS header below.
#           The real_ip blocks below are already in place for II.
# ============================================================

upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:80;
    keepalive 16;
}

# ── Real client IP ───────────────────────────────────────────
# I:  no proxy in front — $remote_addr is the real client IP.
# II: HAProxy will be in front on localhost. Without these lines,
#       $remote_addr would always be 127.0.0.1 after HAProxy is added.
#       These lines are harmless on I.
set_real_ip_from  127.0.0.1;
set_real_ip_from  172.16.0.0/12;   # Docker bridge range
real_ip_header    X-Forwarded-For;
real_ip_recursive on;

# ── Gzip ─────────────────────────────────────────────────────
gzip              on;
gzip_vary         on;
gzip_proxied      any;
gzip_comp_level   5;
gzip_min_length   256;
gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml
    font/ttf
    font/otf
    application/vnd.ms-fontobject;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ── Hide nginx version ───────────────────────────────────
    server_tokens off;

    # ── Security headers ─────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "DENY"             always;
    add_header Referrer-Policy         "same-origin"      always;
    add_header X-XSS-Protection        "1; mode=block"    always;
    # HSTS — uncomment ONLY after HTTPS is confirmed working II.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Request limits ───────────────────────────────────────
    client_max_body_size 50M;
    client_body_timeout  120s;

    # ── Docker DNS ───────────────────────────────────────────
    # Re-resolve every 10s to handle container restarts cleanly.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Nginx health check ───────────────────────────────────
    # Used by Docker healthcheck (see docker-compose.prod.yml).
    # Separate from /api/health/ (which hits Django).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ── Static files (served directly from volume) ───────────
    location /static/ {
        alias /app/staticfiles/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # ── Local media fallback (served from volume) ────────────
    # Used if USE_S3=false. In production USE_S3=true,
    # so /music-media/ (MinIO proxy below) is the active path.
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # ── API ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;
    }

    # ── Django admin ─────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
    }

    # ── MinIO object storage proxy ───────────────────────────
    # Bucket: music-media. Objects stored as e.g. songs/uuid.mp3.
    # $minio_upstream variable forces per-request DNS re-resolution
    # so container restarts don't leave nginx with a stale upstream IP.
    #
    # Range / If-Range headers are passed through to support
    # HTTP range requests for audio streaming (seek, partial play).
    #
    # Day 40: this path stays the same. MinIO stays internal.
    location /music-media/ {
        set $minio_upstream http://minio:9000;
        proxy_pass         $minio_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              minio:9000;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_hide_header  x-amz-id-2;
        proxy_hide_header  x-amz-request-id;
        proxy_buffering    off;
        proxy_set_header   Range             $http_range;
        proxy_set_header   If-Range          $http_if_range;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ── Frontend SPA ─────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
