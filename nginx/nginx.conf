upstream django {
    server backend:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Max upload size (audio files can be large)
    client_max_body_size 50M;

    # ── Static files (served directly by Nginx) ──
    location /static/ {
        alias /app/staticfiles/;
        expires 7d;
        access_log off;
    }

    # ── Media files ──
    # In dev/local-disk mode Nginx can serve these.
    # With MinIO (USE_S3=true) media is served by MinIO directly,
    # so this block is a fallback for local-disk mode.
    location /media/ {
        alias /app/media/;
        expires 7d;
        access_log off;
    }

    # ── Django app (API, admin, docs) ──
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
