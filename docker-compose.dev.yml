services:
  db:
    env_file:
      - ./.env.dev
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  minio:
    env_file:
      - ./.env.dev
    ports:
      - "9000:9000"
      - "9001:9001" # console — dev convenience only

  createbuckets:
    env_file:
      - ./.env.dev

  backend:
    build:
      context: ./backend
      target: dev
    env_file:
      - ./.env.dev
    environment:
      - USE_DOCKER=true
    command: >
      sh -c "
      /app/.venv/bin/python manage.py migrate --noinput &&
      /app/.venv/bin/python manage.py runserver 0.0.0.0:8000
      "
    ports:
      - "8000:8000"         # dev only — direct backend access for debugging
    volumes:
      - ./backend:/app
      - /app/.venv
      - media_files:/app/media

  frontend:
    ports:
      - "3000:80"           # dev only — direct frontend access

  celery_worker:
    build:
      context: ./backend
      target: dev
    env_file:
      - ./.env.dev
    volumes:
      - ./backend:/app
      - /app/.venv
      - media_files:/app/media
