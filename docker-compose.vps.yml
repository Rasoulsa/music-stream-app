# docker-compose.vps.yml
#
# VPS production override.
#
# IMPORTANT — PORT STRATEGY:
#   I:  App Nginx binds host port 80 only.
#         Port 443 is used by an existing service ("X Service") on this VPS.
#         We MUST NOT bind 443 here or the deploy will fail.
#   II: We will introduce HAProxy as an SNI splitter on :443.
#         At that point, App Nginx will bind 127.0.0.1:8443 instead,
#         controlled purely by the NGINX_HTTP_BIND env var below —
#         no structural change to this file's services.
#
# Usage:
#   docker compose \
#     -f docker-compose.prod.yml \
#     -f docker-compose.vps.yml \
#     --env-file .env.prod \
#     up -d --build

services:
  nginx:
    ports:
      - "${NGINX_HTTP_BIND:-0.0.0.0:80}:80"
      - "${NGINX_HTTPS_BIND:-127.0.0.1:8443}:8443"

    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      NGINX_ENVSUBST_FILTER: "APP_DOMAIN"

    volumes:
      # Override the inherited plain default.conf with an empty file
      # (SAME target path → this wins over base/prod mount).
      - ./nginx/disabled/default.conf:/etc/nginx/conf.d/default.conf:ro

      # HTTPS template → generates /etc/nginx/conf.d/app-ssl.conf
      - ./nginx/app-ssl.conf.template:/etc/nginx/templates/app-ssl.conf.template:ro

      # Certs + ACME webroot.
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
  # MinIO console — bound to VPS localhost only (never public).
  # Access via SSH tunnel: ssh -L 9001:localhost:9001 deploy@<vps>
  # then open http://localhost:9001 in your browser.
  minio:
    ports:
      - "127.0.0.1:9001:9001"
