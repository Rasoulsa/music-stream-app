# Nginx config for serving the React SPA.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # SPA fallback: any unmatched route → index.html
    # so React Router can handle client-side routing (e.g. /users/faraz).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively (filenames change on rebuild).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html (so new deploys are picked up).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
