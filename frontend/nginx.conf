# Nginx config for serving the React SPA.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # ── Gzip ────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/ttf
        font/otf
        application/vnd.ms-fontobject;

    # ── Security headers ────────────────────────────────────
    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Deny access to hidden files (.git, .env, etc. if ever copied).
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Cache hashed assets aggressively (Vite adds content hash) ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Cache fonts ─────────────────────────────────────────
    location ~* \.(woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Never cache index.html (so deploys are picked up) ───
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── SPA fallback — must be LAST ─────────────────────────
    # Any unmatched route → index.html so React Router works
    # (e.g. /users/faraz, /upload, deep links on refresh).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
